<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════
         PRIMARY META
    ═══════════════════════════════════════ -->
    <title>MoupUI — Neobrutalist React Component Library</title>
    <meta
      name="description"
      content="MoupUI is a bold Neobrutalist UI component library built with React, Tailwind CSS, and Shadcn UI. Copy-paste ready components with React, Next.js, and HTML code snippets."
    />
    <meta
      name="keywords"
      content="UI component library, React components, Neobrutalism, Tailwind CSS, Shadcn UI, Next.js, MoupUI, design system, copy paste components, open source"
    />
    <meta name="author" content="Mochrks" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://moup-ui.vercel.app/" />

    <!-- ═══════════════════════════════════════
         FAVICON & ICONS
    ═══════════════════════════════════════ -->
    <link rel="icon" type="image/png" href="/logos.png" />
    <link rel="apple-touch-icon" href="/logos.png" />

    <!-- ═══════════════════════════════════════
         OPEN GRAPH (Facebook, LinkedIn, WhatsApp)
    ═══════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://moup-ui.vercel.app/" />
    <meta property="og:title" content="MoupUI — Neobrutalist React Component Library" />
    <meta
      property="og:description"
      content="Bold, expressive UI components built with React, Tailwind CSS & Shadcn UI. Neobrutalist design with multi-format code snippets (React, Next.js, HTML)."
    />
    <meta property="og:image" content="https://moup-ui.vercel.app/logos.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MoupUI — Neobrutalist UI Component Library" />
    <meta property="og:site_name" content="MoupUI" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mochrks" />
    <meta name="twitter:creator" content="@mochrks" />
    <meta name="twitter:title" content="MoupUI — Neobrutalist React Component Library" />
    <meta
      name="twitter:description"
      content="Bold Neobrutalist UI components for React & Next.js. Copy-paste ready with Tailwind CSS & Shadcn UI."
    />
    <meta name="twitter:image" content="https://moup-ui.vercel.app/logos.png" />
    <meta name="twitter:image:alt" content="MoupUI Component Library Preview" />

    <!-- ═══════════════════════════════════════
         JSON-LD STRUCTURED DATA
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MoupUI",
        "url": "https://moup-ui.vercel.app/",
        "description": "A Neobrutalist UI component library built with React, Tailwind CSS, and Shadcn UI.",
        "author": {
          "@type": "Person",
          "name": "Mochrks",
          "url": "https://github.com/Mochrks"
        },
        "publisher": {
          "@type": "Organization",
          "name": "MoupUI",
          "logo": {
            "@type": "ImageObject",
            "url": "https://moup-ui.vercel.app/logos.png"
          }
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://moup-ui.vercel.app/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ═══════════════════════════════════════
         PERFORMANCE HINTS
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <div id="drawer"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
